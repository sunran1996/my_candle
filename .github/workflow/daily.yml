name: YH01 Daily
on:
  schedule:
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install akshare pandas numpy matplotlib
      - run: python YH01/monitor.py
